<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Account — TravelAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060d1f;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: drift 14s ease-in-out infinite alternate;
    }
    body::before {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(124,58,237,0.16) 0%, transparent 70%);
      top: -180px; right: -100px;
    }
    body::after {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(37,99,235,0.14) 0%, transparent 70%);
      bottom: -140px; left: -80px;
      animation-delay: -7s;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,25px) scale(1.07); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(10, 20, 45, 0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .brand { text-align: center; margin-bottom: 28px; }
    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-radius: 16px;
      font-size: 1.6em;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.35);
    }
    .brand h1 {
      font-size: 1.6em;
      font-weight: 700;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.3px;
    }
    .brand p { color: #475569; font-size: 0.875em; margin-top: 5px; }

    .alert {
      display: none;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.84em;
      margin-bottom: 18px;
      border-left: 3px solid;
      line-height: 1.5;
    }
    .alert.error   { background: rgba(239,68,68,0.1);  color: #fca5a5; border-color: #ef4444; display: block; }
    .alert.success { background: rgba(34,197,94,0.1);  color: #86efac; border-color: #22c55e; display: block; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 11px;
      color: #e2e8f0;
      font-size: 0.925em;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px 0;
    }
    .divider hr { flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.07); }
    .divider span { color: #334155; font-size: 0.78em; white-space: nowrap; }

    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 0.8em;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 7px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      font-size: 0.925em;
      font-family: inherit;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input::placeholder { color: #334155; }
    input:focus {
      border-color: rgba(59,130,246,0.6);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
      background: rgba(255,255,255,0.06);
    }

    /* Password strength */
    .strength-track {
      height: 3px;
      background: rgba(255,255,255,0.07);
      border-radius: 2px;
      margin-top: 7px;
      overflow: hidden;
    }
    .strength-bar {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    .hint { font-size: 0.74em; color: #475569; margin-top: 4px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 11px;
      font-size: 0.95em;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 6px;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .submit-btn:hover:not(:disabled)::before { opacity: 1; }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(37,99,235,0.4); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.86em;
      color: #475569;
    }
    .footer-link a { color: #60a5fa; font-weight: 500; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; color: #93c5fd; }

    @media (max-width: 480px) {
      .card { padding: 32px 22px 28px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-icon">✈️</div>
      <h1>TravelAI</h1>
      <p>Create your free account</p>
    </div>

    <div class="alert" id="alertBox"></div>

    <a href="/auth/google" class="google-btn" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider"><hr><span>or create with email</span><hr></div>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="fullName">Full name <span style="color:#1e3a5f;font-weight:400;text-transform:none">(optional)</span></label>
        <input type="text" id="fullName" placeholder="Your name" autocomplete="name">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required>
        <div class="strength-track"><div class="strength-bar" id="strengthBar"></div></div>
        <p class="hint" id="strengthHint"></p>
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input type="password" id="confirm" placeholder="Repeat your password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
    </form>

    <p class="footer-link">Already have an account? <a href="/login">Sign in</a></p>
  </div>

  <script>
    const alertBox   = document.getElementById('alertBox');
    const submitBtn  = document.getElementById('submitBtn');
    const pwInput    = document.getElementById('password');
    const strengthBar  = document.getElementById('strengthBar');
    const strengthHint = document.getElementById('strengthHint');
    const googleBtn  = document.getElementById('googleBtn');

    function showAlert(msg, type = 'error') {
      alertBox.textContent = msg;
      alertBox.className = 'alert ' + type;
    }

    googleBtn.addEventListener('click', () => {
      googleBtn.style.opacity = '0.6';
      googleBtn.style.pointerEvents = 'none';
      googleBtn.textContent = 'Redirecting…';
    });

    const STRENGTH_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#16a34a'];
    const STRENGTH_LABELS = ['','Weak','Fair','Good','Strong','Very strong'];

    function calcStrength(pw) {
      let s = 0;
      if (pw.length >= 8)           s++;
      if (pw.length >= 12)          s++;
      if (/[A-Z]/.test(pw))         s++;
      if (/[0-9]/.test(pw))         s++;
      if (/[^A-Za-z0-9]/.test(pw))  s++;
      return s;
    }

    pwInput.addEventListener('input', () => {
      const pw = pwInput.value;
      if (!pw) { strengthBar.style.width = '0'; strengthHint.textContent = ''; return; }
      const score = calcStrength(pw);
      strengthBar.style.width      = Math.min(100, score * 20) + '%';
      strengthBar.style.background = STRENGTH_COLORS[score - 1] || '#334155';
      strengthHint.textContent     = STRENGTH_LABELS[score] || '';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      alertBox.className = 'alert';

      const email    = document.getElementById('email').value.trim();
      const password = pwInput.value;
      const confirm  = document.getElementById('confirm').value;
      const fullName = document.getElementById('fullName').value.trim();

      if (!email)                   return showAlert('Email address is required.');
      if (!password)                return showAlert('Password is required.');
      if (password.length < 8)      return showAlert('Password must be at least 8 characters.');
      if (password !== confirm)     return showAlert('Passwords do not match.');

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account…';

      try {
        const res  = await fetch('/auth/register', {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password, full_name: fullName }),
        });
        const data = await res.json();
        if (data.success) {
          if (data.confirm_email) {
            showAlert(data.message, 'success');
            submitBtn.textContent = 'Check your inbox ✓';
          } else {
            window.location.href = '/';
          }
        } else {
          showAlert(data.error || 'Registration failed. Please try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create Account';
        }
      } catch {
        showAlert('Network error. Check your connection and try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
