<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TravelAI — Your intelligent travel companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #060d1f;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 25%, rgba(37,99,235,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(124,58,237,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      background: rgba(6,13,31,0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05em;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.2px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1em;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    }
    .user-controls { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8em; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .user-name { font-size: 0.85em; color: #64748b; max-width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: #475569;
      padding: 5px 12px;
      border-radius: 7px;
      font-size: 0.78em;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { color: #e2e8f0; border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }

    /* ── Chat main ── */
    .chat-main {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 28px 24px 20px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }
    .chat-main::-webkit-scrollbar { width: 5px; }
    .chat-main::-webkit-scrollbar-track { background: transparent; }
    .chat-main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* ── Welcome state ── */
    #welcomeState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 200px);
      text-align: center;
      padding: 20px;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .welcome-plane {
      font-size: 3.5em;
      margin-bottom: 20px;
      animation: float 3.5s ease-in-out infinite;
      filter: drop-shadow(0 0 28px rgba(96,165,250,0.5));
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%       { transform: translateY(-10px) rotate(4deg); }
    }
    .welcome-title {
      font-size: 2.2em;
      font-weight: 700;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .welcome-sub { color: #475569; font-size: 1em; margin-bottom: 36px; max-width: 360px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 600px; }
    .chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      color: #94a3b8;
      padding: 9px 16px;
      border-radius: 50px;
      font-size: 0.84em;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .chip:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.35); color: #93c5fd; transform: translateY(-1px); }

    /* ── Messages ── */
    #messages { display: flex; flex-direction: column; gap: 22px; max-width: 800px; margin: 0 auto; }

    .message { display: flex; gap: 12px; animation: msgIn 0.28s ease; }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      align-self: flex-end;
      font-size: 0.85em; font-weight: 700;
    }
    .msg-avatar.bot-av { background: linear-gradient(135deg, #1e3a8a, #4f46e5); font-size: 1.1em; }
    .msg-avatar.user-av { background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; }

    .bubble { max-width: min(680px, 82%); padding: 13px 17px; border-radius: 16px; font-size: 0.925em; line-height: 1.7; }
    .message.bot .bubble {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid rgba(59,130,246,0.45);
      border-radius: 4px 16px 16px 16px;
      color: #cbd5e1;
    }
    .message.user .bubble {
      background: linear-gradient(135deg, #1d4ed8, #6d28d9);
      color: #eff6ff;
      border-radius: 16px 4px 16px 16px;
      box-shadow: 0 4px 16px rgba(37,99,235,0.25);
    }

    /* Markdown inside bot bubble */
    .bubble strong, .bubble b { color: #f1f5f9; font-weight: 600; }
    .bubble em, .bubble i { color: #cbd5e1; font-style: italic; }
    .bubble code {
      background: rgba(255,255,255,0.08);
      color: #7dd3fc;
      padding: 2px 6px;
      border-radius: 5px;
      font-size: 0.875em;
      font-family: 'Fira Code', 'Courier New', monospace;
    }
    .bubble pre { background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px; margin: 10px 0; overflow-x: auto; }
    .bubble pre code { background: none; padding: 0; }
    .bubble h3 { color: #f1f5f9; font-size: 1em; font-weight: 600; margin: 14px 0 5px; }
    .bubble h4 { color: #93c5fd; font-size: 0.9em; font-weight: 600; margin: 11px 0 4px; }
    .bubble p { margin: 5px 0; }
    .bubble ul, .bubble ol { padding-left: 18px; margin: 7px 0; }
    .bubble li { margin: 3px 0; }
    .bubble hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 10px 0; }
    .bubble a { color: #60a5fa; text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }

    /* ── Typing indicator ── */
    #typingRow { display: none; align-items: center; gap: 12px; max-width: 800px; margin: 0 auto; padding-bottom: 4px; }
    .typing-bubble {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 3px solid rgba(59,130,246,0.45);
      border-radius: 4px 16px 16px 16px;
      padding: 13px 17px;
      display: flex; gap: 5px; align-items: center;
    }
    .dot {
      width: 7px; height: 7px;
      background: #3b82f6;
      border-radius: 50%;
      animation: bounce 1.3s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
      30%           { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      position: relative; z-index: 20;
      padding: 14px 24px 10px;
      background: rgba(6,13,31,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 800px; margin: 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
    #msgInput {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: #e2e8f0; font-family: inherit; font-size: 0.925em;
      line-height: 1.55; resize: none;
      max-height: 180px; min-height: 24px;
      overflow-y: auto;
    }
    #msgInput::placeholder { color: #334155; }
    #msgInput::-webkit-scrollbar { width: 4px; }
    #msgInput::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    #sendBtn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none; color: white;
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; flex-shrink: 0;
    }
    #sendBtn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.45); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .disclaimer { text-align: center; font-size: 0.7em; color: #1e293b; margin-top: 8px; max-width: 800px; margin-left: auto; margin-right: auto; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .chat-main { padding: 20px 14px 14px; }
      .input-area { padding: 12px 14px 8px; }
      .user-name { display: none; }
      .welcome-title { font-size: 1.7em; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">✈️</div>
      TravelAI
    </div>
    <div class="user-controls">
      <div class="user-avatar">{{ (user_name or user_email or 'U')[0] | upper }}</div>
      <span class="user-name">{{ user_name or user_email }}</span>
      <button class="logout-btn" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main class="chat-main" id="chatMain">
    <div id="welcomeState">
      <div class="welcome-plane">✈️</div>
      <h2 class="welcome-title">Where to next?</h2>
      <p class="welcome-sub">Ask me anything — trains, hotels, routes, weather, or full trip plans</p>
      <div class="chips">
        <button class="chip" data-msg="How do I get to Kasol from Delhi? I need cheap stays with good WiFi for remote work.">Kasol for remote work 💻</button>
        <button class="chip" data-msg="What is the best time to visit Goa and what are the top things to do there?">Best time for Goa 🏖️</button>
        <button class="chip" data-msg="Plan a 5-day budget trip to Kerala for me.">5-day Kerala trip 🌴</button>
        <button class="chip" data-msg="I want to do a Himalayan trek. What are the best options for beginners?">Himalayan trek 🏔️</button>
      </div>
    </div>

    <div id="messages"></div>

    <div id="typingRow">
      <div class="msg-avatar bot-av">✈</div>
      <div class="typing-bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
  </main>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="msgInput" rows="1" placeholder="Ask about trains, hotels, weather, trips…" autocomplete="off"></textarea>
      <button id="sendBtn" title="Send (Enter)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="disclaimer">TravelAI can make mistakes — verify critical travel info before booking.</p>
  </div>

  <script>
    const USER_INITIAL = {{ ('"' + ((user_name or user_email or 'U')[0] | upper) + '"') | safe }};

    const chatMain  = document.getElementById('chatMain');
    const messages  = document.getElementById('messages');
    const msgInput  = document.getElementById('msgInput');
    const sendBtn   = document.getElementById('sendBtn');
    const typingRow = document.getElementById('typingRow');
    const welcomeEl = document.getElementById('welcomeState');
    const logoutBtn = document.getElementById('logoutBtn');

    // ── Markdown renderer ──────────────────────────────────
    function md(raw) {
      let t = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      t = t.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
      t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      t = t.replace(/^## (.+)$/gm,  '<h4>$1</h4>');
      t = t.replace(/^# (.+)$/gm,   '<h3>$1</h3>');
      t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      t = t.replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>');
      t = t.replace(/\*([^*\n]+?)\*/g,    '<em>$1</em>');
      t = t.replace(/^---+$/gm, '<hr>');

      const lines = t.split('\n');
      const out = [];
      let inUl = false, inOl = false;

      for (const line of lines) {
        const ulM = line.match(/^[\*\-•] (.+)/);
        const olM = line.match(/^\d+[\.\)] (.+)/);
        if (ulM) {
          if (inOl) { out.push('</ol>'); inOl = false; }
          if (!inUl) { out.push('<ul>'); inUl = true; }
          out.push('<li>' + ulM[1] + '</li>');
        } else if (olM) {
          if (inUl) { out.push('</ul>'); inUl = false; }
          if (!inOl) { out.push('<ol>'); inOl = true; }
          out.push('<li>' + olM[1] + '</li>');
        } else {
          if (inUl) { out.push('</ul>'); inUl = false; }
          if (inOl) { out.push('</ol>'); inOl = false; }
          const tr = line.trim();
          if (!tr) {
            out.push('<br>');
          } else if (/^<(h[34]|pre|hr|ul|ol|li)/.test(tr)) {
            out.push(tr);
          } else {
            out.push('<p>' + tr + '</p>');
          }
        }
      }
      if (inUl) out.push('</ul>');
      if (inOl) out.push('</ol>');
      return out.join('').replace(/(<br>\s*){3,}/g, '<br><br>');
    }

    // ── Add message bubble ─────────────────────────────────
    function addMessage(role, text) {
      welcomeEl.style.display = 'none';
      const row = document.createElement('div');
      row.className = 'message ' + role;
      const av = document.createElement('div');
      av.className = 'msg-avatar ' + (role === 'bot' ? 'bot-av' : 'user-av');
      av.textContent = role === 'bot' ? '✈' : USER_INITIAL;
      const bub = document.createElement('div');
      bub.className = 'bubble';
      if (role === 'bot') { bub.innerHTML = md(text); } else { bub.textContent = text; }
      row.appendChild(av);
      row.appendChild(bub);
      messages.appendChild(row);
      scrollBottom();
    }

    function scrollBottom() {
      chatMain.scrollTo({ top: chatMain.scrollHeight, behavior: 'smooth' });
    }
    function showTyping() { typingRow.style.display = 'flex'; scrollBottom(); }
    function hideTyping() { typingRow.style.display = 'none'; }

    // ── Send ───────────────────────────────────────────────
    async function send() {
      const text = msgInput.value.trim();
      if (!text || sendBtn.disabled) return;
      addMessage('user', text);
      msgInput.value = '';
      msgInput.style.height = 'auto';
      sendBtn.disabled = true;
      showTyping();
      try {
        const res  = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        hideTyping();
        if (res.status === 401) { window.location.href = '/login'; return; }
        addMessage('bot', data.response || data.error || 'Something went wrong.');
      } catch {
        hideTyping();
        addMessage('bot', 'Network error — please check your connection.');
      } finally {
        sendBtn.disabled = false;
        msgInput.focus();
      }
    }

    // ── Input events ───────────────────────────────────────
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
    });
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    sendBtn.addEventListener('click', send);

    // ── Chips ──────────────────────────────────────────────
    document.querySelectorAll('.chip').forEach(c => {
      c.addEventListener('click', () => {
        msgInput.value = c.dataset.msg;
        msgInput.dispatchEvent(new Event('input'));
        send();
      });
    });

    // ── Logout ─────────────────────────────────────────────
    logoutBtn.addEventListener('click', async () => {
      logoutBtn.textContent = '…';
      await fetch('/auth/logout', { method: 'POST' }).catch(() => {});
      window.location.href = '/login';
    });

    // ── Load history ───────────────────────────────────────
    (async () => {
      try {
        const res  = await fetch('/history');
        const data = await res.json();
        (data.messages || []).forEach(m =>
          addMessage(m.role === 'user' ? 'user' : 'bot', m.content)
        );
      } catch { /* non-fatal */ }
    })();
  </script>
</body>
</html>
